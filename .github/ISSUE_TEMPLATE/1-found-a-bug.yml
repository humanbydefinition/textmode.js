name: Bug Report
description: Report broken or incorrect behavior in textmode.js.
labels: [Bug]
body:
  - type: checkboxes
    id: area
    attributes:
      label: Most relevant area
      description: You may select more than one.
      options:
        - label: Core API / Textmodifier
        - label: Rendering / WebGL
        - label: Layers / compositing
        - label: Filters / shaders
        - label: Images / video / conversion
        - label: Fonts / typography
        - label: Input / interaction
        - label: Plugin system
        - label: Build / types / packaging
        - label: Documentation / examples
        - label: Other
  - type: input
    id: version
    attributes:
      label: textmode.js version
      description: Example: 0.11.0-beta.1
      placeholder: 0.11.0-beta.1
  - type: input
    id: environment
    attributes:
      label: Browser, runtime, and OS
      description: Include browser/version and OS. If relevant, include package manager, bundler, and import mode.
      placeholder: Chrome 135, macOS 15.4, npm + Vite, ESM import
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Include a minimal repro. A shared `editor.textmode.art` sketch or reduced code snippet is ideal. Add console errors if present.
      value: |
        1.
        2.
        3.

        Minimal repro:

        ```js
        // Paste the smallest example that still reproduces the issue.
        ```
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Screenshots, recordings, GPU details, stack traces, or related issues.
    validations:
      required: false
